name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, verify & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # Workspace packages publish/resolve their types from dist/. A clean
      # checkout has no dist/ — only a stale local one hides missing build edges.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm package
      - run: node scripts/package-smoke.mjs

      - name: Publish core and CLI to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo '::notice::NPM_TOKEN secret not configured — validating npm packages with dry runs.'
            pnpm --filter @surrounded-by-slop/core publish --dry-run --no-git-checks
            pnpm --filter @surrounded-by-slop/cli publish --dry-run --no-git-checks
            exit 0
          fi
          pnpm --filter @surrounded-by-slop/core publish --access public --provenance --no-git-checks
          pnpm --filter @surrounded-by-slop/cli publish --access public --provenance --no-git-checks

      - name: GitHub release with VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            packages/extension/surrounded-by-slop.vsix \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: packages/extension
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo '::notice::VSCE_PAT secret not configured — skipping Marketplace publish.'
            exit 0
          fi
          pnpm exec vsce publish --no-dependencies --packagePath surrounded-by-slop.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        working-directory: packages/extension
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo '::notice::OVSX_PAT secret not configured — skipping Open VSX publish.'
            exit 0
          fi
          pnpm exec ovsx publish surrounded-by-slop.vsix --pat "$OVSX_PAT"
