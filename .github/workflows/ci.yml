name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  integration:
    name: Integration (${{ matrix.os }}, VS Code ${{ matrix.vscode }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        vscode: [stable]
        include:
          # The oldest supported VS Code (engines.vscode) must keep passing.
          - os: ubuntu-latest
            vscode: 1.96.0
    runs-on: ${{ matrix.os }}
    env:
      VSCODE_TEST_VERSION: ${{ matrix.vscode }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @surrounded-by-slop/core build && pnpm --filter @surrounded-by-slop/webview build
      - name: Run integration suite
        # The downloaded VS Code needs a display server on Linux.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a pnpm --filter surrounded-by-slop test:integration
          else
            pnpm --filter surrounded-by-slop test:integration
          fi
        shell: bash
      - name: Upload VS Code logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vscode-logs-${{ matrix.os }}-${{ matrix.vscode }}
          path: packages/extension/.vscode-test/user-data/logs/
          if-no-files-found: ignore

  bench:
    name: Benchmarks
    # Trend tracking on main only — PRs stay fast; budgets still gate here.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @surrounded-by-slop/core build
      - run: node scripts/bench.mjs --json bench-report.json
      - uses: actions/upload-artifact@v7
        with:
          name: bench-report-${{ github.sha }}
          path: bench-report.json

  package:
    name: Package VSIX
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package
      - uses: actions/upload-artifact@v7
        with:
          name: surrounded-by-slop-vsix
          path: packages/extension/surrounded-by-slop.vsix
          if-no-files-found: error

  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Every commit carries a Signed-off-by trailer
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          # Bots (dependabot, github-actions) can't sign the DCO — it only
          # binds humans certifying they may contribute the code.
          missing="$(git log --format='%h %an %s' --invert-grep --grep='Signed-off-by:' "$base..$head" | grep -v '\[bot\]' || true)"
          if [ -n "$missing" ]; then
            echo 'Commits missing a DCO sign-off:'
            echo "$missing"
            echo
            echo 'Sign your commits with: git commit -s (see CONTRIBUTING.md).'
            exit 1
          fi
